<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hukamnama Selector</title>
        <link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/select/1.3.1/css/select.dataTables.min.css">
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/select/1.3.1/js/dataTables.select.min.js"></script>
        <style>
            @font-face {
                font-family: 'GurbaniAkhar';
                src: url('GURAKHAR.TTF') format('truetype');
            }
            body, h2, label, button, table {
                font-family: 'GurbaniAkhar', sans-serif;
            }
            #loginForm {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: white;
                padding: 20px;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
        </style>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }).catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
                });
            }
        </script>
    </head>
<body>
    <div id="loginForm" class="container">
        <h2>lOg ien</h2>
        <div class="form-group">
            <label for="username">XUzr nym:</label>
            <input type="text" class="form-control" id="username">
        </div>
        <div class="form-group">
            <label for="password">pwsvrf:</label>
            <input type="password" class="form-control" id="password">
        </div>
        <button class="btn btn-primary" id="loginButton">lOg ien kro</button>
    </div>

    <div id="content" class="container mt-5" style="display: none;">
        <h2>Sbd koS</h2>
        <div class="form-group">
            <label for="pageNumber">AMg nMbr:</label>
            <input type="number" class="form-control" id="pageNumber" min="1">
        </div>
        <button class="btn btn-primary" id="fetchData">Sbd cuxo</button>
        <table id="dataTable" class="display mt-3" style="width:100%">
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button class="btn btn-success mt-3" id="submitData">Sbd pRkwSq kro</button>
    </div>

    <script>
        $(document).ready(function () {
            let validUsername = "";
            let validPassword = "";

            $('#loginForm').show();

            $.getJSON('/select-config')
                .done(function (config) {
                    validUsername = config.username;
                    validPassword = config.password;
                })
                .fail(function () {
                    alert('Failed to load login configuration.');
                });

            $('#loginButton').on('click', function () {
                const username = $('#username').val();
                const password = $('#password').val();

                if (username === validUsername && password === validPassword) {
                    $('#loginForm').hide();
                    $('#content').show();
                } else {
                    alert('Invalid credentials. Please try again.');
                }
            });

            // Existing DataTable and data submission logic
            let table;
            $('#fetchData').on('click', function () {
                const pageNumber = $('#pageNumber').val();
                const apiUrl = `/getShabads/${pageNumber}`;
                

                $.get(apiUrl, function (data) {
                    const jsonData = data;

                    if (table) {
                        table.destroy();
                        $('#dataTable').empty();
                    }

                    $('#tableHeaders').empty();
                    $('#tableBody').empty();

                    const headers = Object.keys(jsonData[0]);
                    headers.forEach(header => {
                        $('#tableHeaders').append(`<th>${header}</th>`);
                    });

                    jsonData.forEach(row => {
                        let rowData = '<tr>';
                        headers.forEach(header => {
                            rowData += `<td>${row[header]}</td>`;
                        });
                        rowData += '</tr>';
                        $('#tableBody').append(rowData);
                    });

                    table = $('#dataTable').DataTable({
                        responsive: true,
                        select: {
                            style: 'multi'
                        }
                    });
                });
            });

            $('#submitData').on('click', function () {
                const selectedData = table.rows({ selected: true }).data().toArray();

                if (selectedData.length === 0) {
                    alert("No rows selected.");
                    return;
                }

                const firstColumnValue = selectedData[0][Object.keys(selectedData[0])[0]];
                const numSelected = selectedData.length;

                const lastRow = selectedData[selectedData.length - 1];
                const lastColumnValue = lastRow[Object.keys(lastRow)[0]];

                const data = {
                    firstShabad: `${firstColumnValue}`,
                    lastShabad: `${lastColumnValue}`
                };

                console.log(data);

                const submitUrl = "/submit/";

                $.ajax({
                    url: submitUrl,
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(data),
                    success: function () {
                        alert("Data submitted successfully");
                    },
                    error: function (jqXHR) {
                        console.error("Error:", jqXHR.responseText);
                        alert("Failed to submit data");
                    }
                });
            });
        });
    </script>
</body>
</html>
